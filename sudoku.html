<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Sudoku — Memphis Treviño</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f0e8;
      --surface: #ffffff;
      --surface2: #ede8df;
      --border: #c8bfb0;
      --text: #1a1410;
      --text-muted: #7a6e62;
      --accent: #bf5700;
      --accent-light: #f4e0d0;
      --correct: #2e6b3e;
      --error: #c0392b;
      --error-bg: #fdecea;
      --given-bg: #e2d9cc;
      --given-text: #1a1410;
      --cell-hover: #fdf0e6;
      --cell-selected: #ffe8cc;
      --cell-peer: #faf5ee;
      --shadow: rgba(0,0,0,0.08);
      --box-border: #1a1410;
      --radius: 12px;
    }
    [data-theme="dark"] {
      --bg: #141210;
      --surface: #1f1c18;
      --surface2: #2a2520;
      --border: #3d3730;
      --text: #f0ebe0;
      --text-muted: #8a8070;
      --accent: #e07030;
      --accent-light: #3a2010;
      --correct: #4aab62;
      --error: #e05040;
      --error-bg: #2a1510;
      --given-bg: #2e2820;
      --given-text: #f0ebe0;
      --cell-hover: #2a2015;
      --cell-selected: #3a2810;
      --cell-peer: #232018;
      --shadow: rgba(0,0,0,0.4);
      --box-border: #b0a898;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    .site-nav {
      display: flex;
      align-items: center;
      background: var(--accent);
      padding: 0 24px;
    }
    [data-theme="dark"] .site-nav { background: #7a3800; }
    .site-nav a {
      color: #fff;
      text-decoration: none;
      padding: 14px 22px;
      font-size: 15px;
      font-weight: 700;
      border-bottom: 3px solid transparent;
      transition: border-color 0.2s, background 0.2s;
    }
    .site-nav a:hover { background: rgba(255,255,255,0.12); border-bottom-color: #fff; }
    .site-nav a.active { border-bottom-color: #fff; background: rgba(255,255,255,0.1); }
    .site-nav .nav-label { color: rgba(255,255,255,0.55); font-size: 13px; margin-right: 8px; }
    .site-nav .nav-right { margin-left: auto; }
    .dark-toggle {
      background: rgba(255,255,255,0.15);
      border: 1.5px solid rgba(255,255,255,0.4);
      border-radius: 999px;
      padding: 6px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .dark-toggle:hover { background: rgba(255,255,255,0.28); }

    .page-wrap { max-width: 560px; margin: 0 auto; padding: 32px 16px 60px; }

    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .page-title-block h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(38px, 8vw, 56px);
      letter-spacing: 0.04em;
      color: var(--accent);
      line-height: 1;
    }
    .page-title-block p { color: var(--text-muted); font-size: 13px; margin-top: 4px; }

    .mode-row { display: flex; gap: 10px; margin-bottom: 20px; }
    .mode-btn {
      flex: 1;
      padding: 12px 10px;
      border-radius: var(--radius);
      border: 2px solid var(--border);
      background: var(--surface);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }
    .mode-btn .mode-sub { font-size: 11px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }
    .mode-btn:hover { border-color: var(--accent); color: var(--text); }
    .mode-btn.selected { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }

    .game-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 4px 24px var(--shadow);
      margin-bottom: 20px;
    }

    .game-info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .timer-display {
      font-family: 'DM Mono', monospace;
      font-size: 26px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.08em;
    }
    .timer-display.running { color: var(--accent); }
    .timer-display.done { color: var(--correct); }

    .status-badge {
      font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 5px 12px; border-radius: 999px;
      background: var(--surface2); color: var(--text-muted);
    }
    .status-badge.error { background: var(--error-bg); color: var(--error); }
    .status-badge.won { background: #e0f5e8; color: var(--correct); }
    [data-theme="dark"] .status-badge.won { background: #1a3025; }

    /* =====================================================
       6×6 SUDOKU GRID — boxes are 2 rows × 3 cols each
       =====================================================
       6 total cells per row, 6 rows.
       Box layout: 3 box-rows × 2 box-cols  ← NO, user wants 2 box-rows × 3 box-cols
       
       2 box-rows × 3 box-cols:
         Each box = (6 rows / 2) tall × (6 cols / 3) wide = 3 rows tall × 2 cols wide
         
       WAIT — if 2 box-rows × 3 box-cols:
         box height = 6/2 = 3 rows, box width = 6/3 = 2 cols
         → boxes are 3 tall × 2 wide  (same as before, that's what user complained about)
       
       User wants boxes that are 2 rows tall × 3 cols wide.
       That means each box is 2 rows × 3 cols.
       So box grid = 6/2 box-rows-of-cells × 6/3 box-cols-of-cells = 3 box-rows × 2 box-cols.
       
       BOX BORDERS:
         Thick col border: after every 3 cols → after col index 2 only
         Thick row border: after every 2 rows → after row index 1 and row index 3
    ===================================================== */

    .sudoku-wrap { display: flex; justify-content: center; margin-bottom: 18px; }

    .sudoku-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: repeat(6, 1fr);
      border: 3px solid var(--box-border);
      border-radius: 8px;
      overflow: hidden;
      width: min(360px, calc(100vw - 72px));
      aspect-ratio: 1;
    }

    .sudoku-cell {
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      font-size: clamp(15px, 4vw, 24px);
      font-weight: 500;
      cursor: pointer;
      transition: background 0.12s;
      user-select: none;
    }

    /* Thick RIGHT border after col 2 (every 3 cols → one box boundary at col 2) */
    .sudoku-cell[data-col="2"] {
      border-right: 3px solid var(--box-border);
    }

    /* Thick BOTTOM border after row 1 and row 3 (every 2 rows) */
    .sudoku-cell[data-row="1"],
    .sudoku-cell[data-row="3"] {
      border-bottom: 3px solid var(--box-border);
    }

    .sudoku-cell.given {
      background: var(--given-bg);
      color: var(--given-text);
      cursor: default;
      font-weight: 700;
    }
    .sudoku-cell.editable { background: var(--surface); color: var(--accent); }
    .sudoku-cell.editable:hover:not(.selected) { background: var(--cell-hover); }
    .sudoku-cell.peer { background: var(--cell-peer); }
    .sudoku-cell.selected {
      background: var(--cell-selected) !important;
      outline: 2.5px solid var(--accent);
      outline-offset: -2.5px;
      z-index: 1;
    }
    .sudoku-cell.wrong { background: var(--error-bg) !important; color: var(--error) !important; }
    .sudoku-cell.correct-fill { color: var(--correct) !important; }

    .numpad { display: flex; gap: 6px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }
    .num-btn {
      width: 42px; height: 42px; border-radius: 9px;
      border: 2px solid var(--border); background: var(--surface2);
      font-family: 'DM Mono', monospace; font-size: 17px; font-weight: 500;
      cursor: pointer; color: var(--text); transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .num-btn:hover { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
    .num-btn.erase { font-size: 13px; font-family: 'DM Sans', sans-serif; width: 54px; }

    .controls-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .ctrl-btn {
      padding: 10px 20px; border-radius: 9px;
      border: 2px solid var(--border); background: var(--surface2);
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700;
      cursor: pointer; color: var(--text); transition: all 0.2s;
    }
    .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
    .ctrl-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .ctrl-btn.primary:hover { opacity: 0.88; }

    .hint-row { display: flex; justify-content: center; margin-top: 10px; }
    .hint-label { font-size: 13px; color: var(--text-muted); text-align: center; }

    .win-banner {
      display: none;
      background: linear-gradient(135deg, #2e6b3e, #1e5530);
      color: #fff; border-radius: var(--radius);
      padding: 16px 22px; text-align: center; margin-bottom: 18px;
      animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .win-banner.show { display: block; }
    .win-banner h2 { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 0.05em; }
    .win-banner p { font-size: 14px; opacity: 0.9; margin-top: 4px; }
    @keyframes popIn {
      from { transform: scale(0.85); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .pb-card {
      background: var(--surface); border: 2px solid var(--border);
      border-radius: var(--radius); padding: 18px 22px;
    }
    .pb-card h3 {
      font-family: 'Bebas Neue', sans-serif; font-size: 22px;
      letter-spacing: 0.05em; color: var(--accent); margin-bottom: 12px;
    }
    .pb-table { width: 100%; border-collapse: collapse; }
    .pb-table th {
      text-align: left; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted);
      padding: 5px 10px; border-bottom: 2px solid var(--border);
    }
    .pb-table td {
      padding: 10px; font-family: 'DM Mono', monospace; font-size: 15px;
      border-bottom: 1px solid var(--surface2);
    }
    .pb-table tr:last-child td { border-bottom: none; }
    .pb-table .mode-col { font-family: 'DM Sans', sans-serif; font-weight: 700; color: var(--text); font-size: 14px; }
    .pb-table .time-col { color: var(--accent); }
    .pb-table .none-col { color: var(--text-muted); font-size: 13px; font-family: 'DM Sans', sans-serif; }
    .pb-clear-btn {
      margin-top: 12px; padding: 6px 14px; font-size: 12px; font-weight: 700;
      border-radius: 8px; border: 1.5px solid var(--border);
      background: transparent; color: var(--text-muted); cursor: pointer;
      font-family: 'DM Sans', sans-serif; transition: all 0.2s;
    }
    .pb-clear-btn:hover { border-color: var(--error); color: var(--error); }

    .diff-badge {
      display: inline-block; font-size: 11px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 3px 9px; border-radius: 99px;
    }
    .diff-badge.easy { background: #e0f5e8; color: var(--correct); }
    .diff-badge.hard { background: var(--error-bg); color: var(--error); }
    [data-theme="dark"] .diff-badge.easy { background: #1a3025; }
  </style>
</head>
<body>

  <nav class="site-nav">
    <span class="nav-label">Navigate:</span>
    <a href="index.html">🏠 Home</a>
    <a href="sudoku.html" class="active">🧩 Mini Sudoku</a>
    <div class="nav-right">
      <button class="dark-toggle" onclick="toggleDark()" id="darkBtn">🌙 Dark Mode</button>
    </div>
  </nav>

  <div class="page-wrap">

    <div class="page-header">
      <div class="page-title-block">
        <h1>Mini Sudoku</h1>
        <p>6×6 grid · 6 boxes (2 rows × 3 cols each) · numbers 1–6</p>
      </div>
    </div>

    <div class="mode-row">
      <button class="mode-btn selected" id="btnEasy" onclick="selectMode('easy')">
        <span>😊 Easy</span>
        <span class="mode-sub">More cells given</span>
      </button>
      <button class="mode-btn" id="btnHard" onclick="selectMode('hard')">
        <span>🔥 Hard</span>
        <span class="mode-sub">Fewer cells given</span>
      </button>
    </div>

    <div class="win-banner" id="winBanner">
      <h2>🎉 Puzzle Solved!</h2>
      <p id="winMsg"></p>
    </div>

    <div class="game-card">
      <div class="game-info-row">
        <div class="timer-display" id="timerDisplay">0:00</div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="diff-badge easy" id="diffBadge">Easy</span>
          <div class="status-badge" id="statusBadge">Ready</div>
        </div>
      </div>

      <div class="sudoku-wrap">
        <div class="sudoku-grid" id="sudokuGrid"></div>
      </div>

      <div class="numpad">
        <button class="num-btn" onclick="enterNum(1)">1</button>
        <button class="num-btn" onclick="enterNum(2)">2</button>
        <button class="num-btn" onclick="enterNum(3)">3</button>
        <button class="num-btn" onclick="enterNum(4)">4</button>
        <button class="num-btn" onclick="enterNum(5)">5</button>
        <button class="num-btn" onclick="enterNum(6)">6</button>
        <button class="num-btn erase" onclick="enterNum(0)">⌫ Erase</button>
      </div>

      <div class="controls-row">
        <button class="ctrl-btn primary" onclick="newGame()">New Puzzle</button>
        <button class="ctrl-btn" onclick="checkBoard()">Check</button>
        <button class="ctrl-btn" onclick="resetBoard()">Reset</button>
      </div>

      <div class="hint-row">
        <span class="hint-label" id="hintLabel"></span>
      </div>
    </div>

    <div class="pb-card">
      <h3>🏆 Personal Bests</h3>
      <table class="pb-table">
        <thead><tr><th>Mode</th><th>Best Time</th><th>Date</th></tr></thead>
        <tbody id="pbTableBody"></tbody>
      </table>
      <button class="pb-clear-btn" onclick="clearBests()">Clear Records</button>
    </div>

  </div>

  <script>
  // ===== DARK MODE =====
  function toggleDark() {
    const dark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', dark ? 'light' : 'dark');
    document.getElementById('darkBtn').textContent = dark ? '🌙 Dark Mode' : '☀️ Light Mode';
    localStorage.setItem('sudoku-theme', dark ? 'light' : 'dark');
  }
  (() => {
    const t = localStorage.getItem('sudoku-theme');
    if (t) {
      document.documentElement.setAttribute('data-theme', t);
      if (t === 'dark') document.getElementById('darkBtn').textContent = '☀️ Light Mode';
    }
  })();

  // ===== 6×6 SUDOKU ENGINE =====
  // Boxes: each box is 2 rows tall × 3 cols wide
  // Box grid: 3 box-rows × 2 box-cols
  // Box index of cell (r,c): Math.floor(r/2)*2 + Math.floor(c/3)

  function cellIdx(r, c) { return r * 6 + c; }

  function getBoxIdx(r, c) {
    // box row = floor(r/2), box col = floor(c/3)
    return Math.floor(r / 2) * 2 + Math.floor(c / 3);
  }

  function isValid(grid, r, c, val) {
    // Row check
    for (let cc = 0; cc < 6; cc++)
      if (cc !== c && grid[cellIdx(r, cc)] === val) return false;
    // Col check
    for (let rr = 0; rr < 6; rr++)
      if (rr !== r && grid[cellIdx(rr, c)] === val) return false;
    // Box check — box is 2 rows × 3 cols
    const br = Math.floor(r / 2) * 2;   // top row of box
    const bc = Math.floor(c / 3) * 3;   // left col of box
    for (let dr = 0; dr < 2; dr++)
      for (let dc = 0; dc < 3; dc++)
        if ((br+dr !== r || bc+dc !== c) && grid[cellIdx(br+dr, bc+dc)] === val) return false;
    return true;
  }

  function randShuffle(arr) {
    const a = [...arr];
    for (let i = a.length-1; i > 0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  }

  function solve(grid, pos) {
    if (pos === 36) return true;
    const r = Math.floor(pos / 6), c = pos % 6;
    for (const n of randShuffle([1,2,3,4,5,6])) {
      if (isValid(grid, r, c, n)) {
        grid[pos] = n;
        if (solve(grid, pos + 1)) return true;
        grid[pos] = 0;
      }
    }
    return false;
  }

  function generateSolution() {
    const grid = new Array(36).fill(0);
    solve(grid, 0);
    return grid;
  }

  function makePuzzle(sol, mode) {
    const toRemove = mode === 'easy' ? 10 : 22;
    const revealed = new Array(36).fill(true);
    const order = randShuffle([...Array(36).keys()]);
    let removed = 0;
    for (const i of order) {
      if (removed >= toRemove) break;
      revealed[i] = false;
      removed++;
    }
    return revealed;
  }

  // ===== STATE =====
  let currentMode = 'easy';
  let solution = [];
  let revealed = [];
  let userGrid = [];
  let selectedCell = -1;
  let timerInterval = null;
  let elapsed = 0;
  let gameWon = false;
  let gameStarted = false;

  function selectMode(mode) {
    currentMode = mode;
    document.getElementById('btnEasy').classList.toggle('selected', mode==='easy');
    document.getElementById('btnHard').classList.toggle('selected', mode==='hard');
    const b = document.getElementById('diffBadge');
    b.textContent = mode === 'easy' ? 'Easy' : 'Hard';
    b.className = 'diff-badge ' + mode;
    newGame();
  }

  function newGame() {
    clearInterval(timerInterval);
    elapsed = 0; gameWon = false; gameStarted = false; selectedCell = -1;
    solution = generateSolution();
    revealed = makePuzzle(solution, currentMode);
    userGrid = solution.map((v, i) => revealed[i] ? v : 0);
    updateTimerDisplay();
    document.getElementById('timerDisplay').className = 'timer-display';
    document.getElementById('winBanner').classList.remove('show');
    setStatus('Ready', '');
    document.getElementById('hintLabel').textContent = '';
    renderGrid();
    renderPBTable();
  }

  function resetBoard() {
    if (!solution.length) return;
    clearInterval(timerInterval);
    elapsed = 0; gameStarted = false; gameWon = false; selectedCell = -1;
    userGrid = solution.map((v, i) => revealed[i] ? v : 0);
    updateTimerDisplay();
    document.getElementById('timerDisplay').className = 'timer-display';
    document.getElementById('winBanner').classList.remove('show');
    setStatus('Ready', '');
    document.getElementById('hintLabel').textContent = '';
    renderGrid();
  }

  function startTimer() {
    if (gameStarted) return;
    gameStarted = true;
    timerInterval = setInterval(() => { elapsed++; updateTimerDisplay(); }, 1000);
    document.getElementById('timerDisplay').className = 'timer-display running';
  }
  function updateTimerDisplay() {
    const m = Math.floor(elapsed/60), s = elapsed%60;
    document.getElementById('timerDisplay').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  }
  function stopTimer() {
    clearInterval(timerInterval);
    document.getElementById('timerDisplay').className = 'timer-display done';
  }

  function renderGrid() {
    const gridEl = document.getElementById('sudokuGrid');
    gridEl.innerHTML = '';
    const selR = selectedCell >= 0 ? Math.floor(selectedCell/6) : -1;
    const selC = selectedCell >= 0 ? selectedCell%6 : -1;
    const selBox = selectedCell >= 0 ? getBoxIdx(selR, selC) : -1;

    for (let r = 0; r < 6; r++) {
      for (let c = 0; c < 6; c++) {
        const i = cellIdx(r, c);
        const cell = document.createElement('div');
        cell.className = 'sudoku-cell';
        cell.dataset.row = r;
        cell.dataset.col = c;

        if (revealed[i]) {
          cell.classList.add('given');
        } else {
          cell.classList.add('editable');
          if (i === selectedCell) {
            cell.classList.add('selected');
          } else if (selectedCell >= 0 && (r===selR || c===selC || getBoxIdx(r,c)===selBox)) {
            cell.classList.add('peer');
          }
        }

        cell.textContent = userGrid[i] || '';
        cell.addEventListener('click', () => {
          if (!revealed[i] && !gameWon) { selectedCell = i; renderGrid(); }
        });
        gridEl.appendChild(cell);
      }
    }
  }

  function enterNum(n) {
    if (selectedCell < 0 || gameWon || revealed[selectedCell]) return;
    if (!gameStarted) startTimer();
    userGrid[selectedCell] = n;
    document.getElementById('hintLabel').textContent = '';
    setStatus('Playing', '');
    renderGrid();
    if (userGrid.every((v,i) => v === solution[i])) handleWin();
  }

  document.addEventListener('keydown', e => {
    const k = parseInt(e.key);
    if (k >= 1 && k <= 6) { enterNum(k); return; }
    if (e.key==='Backspace'||e.key==='Delete'||e.key==='0') { enterNum(0); return; }
    if (selectedCell >= 0 && !gameWon) {
      const r = Math.floor(selectedCell/6), c = selectedCell%6;
      if (e.key==='ArrowRight'&&c<5) { selectedCell++; renderGrid(); }
      if (e.key==='ArrowLeft' &&c>0) { selectedCell--; renderGrid(); }
      if (e.key==='ArrowDown' &&r<5) { selectedCell+=6; renderGrid(); }
      if (e.key==='ArrowUp'   &&r>0) { selectedCell-=6; renderGrid(); }
    }
  });

  function checkBoard() {
    if (!solution.length || gameWon) return;
    const filled = userGrid.every((v,i) => revealed[i] || v !== 0);
    if (!filled) {
      setStatus('Fill all cells', 'error');
      document.getElementById('hintLabel').textContent = '⚠️ Some cells are still empty.';
      return;
    }
    let errors = 0;
    document.querySelectorAll('.sudoku-cell').forEach((cell, i) => {
      if (!revealed[i]) {
        cell.classList.remove('wrong','correct-fill');
        if (userGrid[i] !== solution[i]) { cell.classList.add('wrong'); errors++; }
        else cell.classList.add('correct-fill');
      }
    });
    if (errors === 0) { handleWin(); }
    else {
      setStatus(`${errors} error${errors>1?'s':''}`, 'error');
      document.getElementById('hintLabel').textContent =
        currentMode === 'hard'
          ? `${errors} cell${errors>1?'s are':' is'} wrong — keep going!`
          : `${errors} mistake${errors>1?'s':''} highlighted in red.`;
    }
  }

  function handleWin() {
    stopTimer();
    gameWon = true;
    const t = document.getElementById('timerDisplay').textContent;
    document.getElementById('winBanner').classList.add('show');
    document.getElementById('winMsg').textContent = `Solved in ${t}! Amazing work 🔥`;
    setStatus('Solved!', 'won');
    savePB(currentMode, elapsed);
    renderPBTable();
    renderGrid();
  }

  function setStatus(msg, type) {
    const b = document.getElementById('statusBadge');
    b.textContent = msg;
    b.className = 'status-badge' + (type ? ' '+type : '');
  }

  function getPBs() { try { return JSON.parse(localStorage.getItem('sudoku-pbs')||'{}'); } catch { return {}; } }
  function savePB(mode, secs) {
    const pbs = getPBs();
    if (!pbs[mode] || secs < pbs[mode].secs) {
      pbs[mode] = { secs, date: new Date().toLocaleDateString() };
      localStorage.setItem('sudoku-pbs', JSON.stringify(pbs));
    }
  }
  function clearBests() {
    if (confirm('Clear all personal bests?')) { localStorage.removeItem('sudoku-pbs'); renderPBTable(); }
  }
  function fmtTime(s) { return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`; }
  function renderPBTable() {
    const pbs = getPBs();
    document.getElementById('pbTableBody').innerHTML = [
      {key:'easy',label:'😊 Easy'},
      {key:'hard',label:'🔥 Hard'}
    ].map(m => {
      const pb = pbs[m.key];
      return `<tr>
        <td class="mode-col">${m.label}</td>
        <td class="${pb?'time-col':'none-col'}">${pb?fmtTime(pb.secs):'—'}</td>
        <td class="${pb?'':'none-col'}">${pb?pb.date:'—'}</td>
      </tr>`;
    }).join('');
  }

  newGame();
  </script>
</body>
</html>
